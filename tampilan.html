<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitoria - Layar Monitor Tamu</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --rose-gold: #B76E79; 
            --maroon-dark: #5D0E11; 
            --soft-pink: #FCE4EC; 
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--soft-pink); color: var(--maroon-dark); overflow: hidden; }
        .font-wedding { font-family: 'Great Vibes', cursive; }
        .font-title { font-family: 'Playfair Display', serif; }
        #custom-bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-size: cover; background-position: center; transition: background-image 0.5s ease-in-out; }
        
        /* Animasi Transisi Halus */
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative p-6">

    <div id="custom-bg-overlay"></div>

    <div id="screen-idle" class="text-center fade-in max-w-2xl bg-white/80 backdrop-blur-md p-12 rounded-3xl border-2 border-rose-gold shadow-2xl z-10">
        <img id="logo-display-idle" src="image_bcc8eb.jpg" alt="Logo" class="mx-auto w-40 h-40 mb-6 object-cover rounded-full shadow-lg border-4 border-rose-gold/50">
        <h1 class="font-wedding text-7xl mb-2">Selamat Datang</h1>
        <p class="font-title text-xl tracking-widest uppercase opacity-80 border-t border-b border-maroon-dark/20 py-2">Di Pernikahan Nayla & Rizal</p>
        <p class="text-xs tracking-wider uppercase mt-6 opacity-60">Silakan tunjukkan QR Code undangan Anda kepada panitia</p>
    </div>

    <div id="screen-welcome" class="hidden text-center max-w-4xl w-full bg-white/90 backdrop-blur-lg p-16 rounded-3xl border-4 border-rose-gold shadow-2xl z-10">
        <p class="font-wedding text-[90px] text-amber-700 leading-none mb-4">Selamat Datang</p>
        
        <div class="py-6 border-t-2 border-b-2 border-rose-gold/30 my-6">
            <p class="text-2xl text-gray-500 mb-2">Bapak / Ibu / Saudara :</p>
            <h2 id="guest-name" class="font-title font-bold text-5xl sm:text-6xl text-maroon shadow-sm tracking-wide leading-tight px-4">Nama Tamu</h2>
        </div>

        <div id="guest-vip-badge" class="inline-block px-8 py-3 rounded-full text-lg font-black uppercase tracking-widest shadow-md">
            STATUS TAMU
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA2lqGVaoUh2SD8l45VAEilru2PjMc8_-0",
            authDomain: "nayla-rizal-wedding.firebaseapp.com",
            databaseURL: "https://nayla-rizal-wedding-default-rtdb.firebaseio.com",
            projectId: "nayla-rizal-wedding",
            storageBucket: "nayla-rizal-wedding.firebasestorage.app",
            messagingSenderId: "870542152103",
            appId: "1:870542152103:web:6011b0b6cc0ba84cc62682",
            measurementId: "G-GEV9775J7Z"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Listen trigger khusus dari monitor panitia
        const monitorRef = database.ref("layar_proyektor_trigger");
        const bgRef = database.ref("app_background_settings");
        const logoRef = database.ref("app_logo_settings");

        let timerSelesai = null;

        // Sinkronisasi Background dan Logo Cloud
        logoRef.on("value", (snapshot) => {
            const config = snapshot.val();
            const defaultLogo = "image_bcc8eb.jpg";
            if(document.getElementById('logo-display-idle')) {
                document.getElementById('logo-display-idle').src = (config && config.image) ? config.image : defaultLogo;
            }
        });

        bgRef.on("value", (snapshot) => {
            const config = snapshot.val();
            const overlay = document.getElementById('custom-bg-overlay');
            if (config && config.image) {
                overlay.style.backgroundImage = `url(${config.image})`;
                overlay.style.opacity = (100 - (config.opacity || 70)) / 100;
            } else {
                overlay.style.backgroundImage = 'none';
                overlay.style.opacity = 0.3;
            }
        });

        // KUNCI UTAMA: Ketika panitia submit data, fungsi ini langsung menangkap nama tamu
        monitorRef.on("value", (snapshot) => {
            const data = snapshot.val();
            if (data && data.status === "menampilkan") {
                clearTimeout(timerSelesai);

                // Masukkan nama dan tipe tamu secara real-time
                document.getElementById('guest-name').innerText = data.nama;
                
                const badge = document.getElementById('guest-vip-badge');
                if (data.vip === "VIP") {
                    badge.innerText = "⭐ TAMU VIP KELUARGA ⭐";
                    badge.className = "inline-block px-8 py-3 rounded-full text-lg font-black uppercase tracking-widest shadow-md bg-amber-600 text-white fade-in";
                } else {
                    badge.innerText = "TAMU UNDANGAN REGULAR";
                    badge.className = "inline-block px-8 py-3 rounded-full text-lg font-black uppercase tracking-widest shadow-md bg-slate-700 text-white fade-in";
                }

                // Alihkan tampilan dari Idle ke Welcome Screen
                document.getElementById('screen-idle').classList.add('hidden');
                document.getElementById('screen-welcome').classList.remove('hidden');
                document.getElementById('screen-welcome').classList.add('fade-in');

                // Tampilkan ucapan selama 6 detik, lalu kembalikan ke layar stand-by semula
                timerSelesai = setTimeout(() => {
                    document.getElementById('screen-welcome').classList.add('hidden');
                    document.getElementById('screen-idle').classList.remove('hidden');
                    monitorRef.set({ status: "idle" });
                }, 6000); 
            }
        });
    </script>
</body>
</html>
